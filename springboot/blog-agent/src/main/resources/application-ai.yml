

ai:
  providers:
    deepseek:
      url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:}
      endpoints:
        chat: /chat/completions
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
        image-gen: /images/generations
    bailian:
      url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        embedding: /compatible-mode/v1/embeddings
        image-gen: /api/v1/services/aigc/multimodal-generation/generation
        rerank: /api/v1/services/rerank/text-rerank/text-rerank


      #熔断策略
      selection:
        failure-threshold: 2  #连续2次触发熔断
        open-duration-ms: 30000 #熔断触发30s

      #流式配置
      stream:
        message-chunk-size: 1

#     #chat模型组
  chat:
    default-model: qwen3-max
    deep-thinking-model: qwen3-max
    candidates:
      - id: qwen3-max
        provider: bailian
        model: qwen3-max
        supports-thinking: true
        priority: 0
      - id:  qwen3.6-plus
        provider: bailian
        model: qwen3.6-plus
        supports-thinking: true
        priority: 1
      - id: minimax2.5
        provider:  siliconflow
        model: Pro/MiniMaxAI/MiniMax-M2.5
        supports-thinking: true
        priority: 2
      - id: deepseek-chat
        provider: deepseek
        model: deepseek-chat
        supports-thinking: false
        priority: 3
      - id: deepseek-reasoner
        provider: deepseek
        model: deepseek-reasoner
        supports-thinking: true
        priority: 4
  embedding:
    default-model: text-embedding-v4
    candidates:
      - id: text-embedding-v4
        provider: bailian
        model: text-embedding-v4
        dimension: 1024
        priority: 1
      - id: qwen3-Embedding-8B
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: 1024
        priority: 2
  # ====== Rerank 模型组 ======
  rerank:
    default-model: qwen3-rerank
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: rerank-noop
        provider: bge-reranker
        model: Pro/BAAI/bge-reranker-v2-m3
        priority: 2

