spring:
  # 数据源配置 - 生产环境
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 生产环境数据库配置 - 请根据实际情况修改
    url: jdbc:mysql://localhost:3306/personal_blog?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:personal_blog}  # 支持环境变量，默认值为root
    password: ${DB_PASSWORD:}  # 请通过环境变量配置

  # 安全配置 - 生产环境
  security:
    user:
      name: ${ADMIN_USERNAME:admin}  # 支持环境变量
      password: ${ADMIN_PASSWORD:your_secure_admin_password}  # 请修改为安全密码

  # 邮件配置 - 生产环境
  mail:
    host: smtp.qq.com
    username: ${EMAIL_USERNAME:1796145608@qq.com}  # 支持环境变量
    password: ${EMAIL_PASSWORD:}  # 支持环境变量
    default-encoding: utf-8
    port: 587
    properties:
      mail:
        debug: false  # 生产环境关闭邮件调试
        smtp:
          auth: true
          ssl:
            enable: true
            protocols: TLSv1.2
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465

# 服务器配置 - 生产环境
server:
  port: ${SERVER_PORT:1239}  # 支持环境变量配置端口

# MyBatis-Plus配置 - 生产环境
mybatis-plus:
  configuration:
    # 生产环境关闭SQL日志输出
    # log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# SpringDoc配置 - 生产环境
springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}  # 生产环境默认关闭Swagger UI，可通过环境变量开启
  api-docs:
    enabled: ${API_DOCS_ENABLED:false}  # 生产环境默认关闭API文档，可通过环境变量开启

# Knife4j配置 - 生产环境
knife4j:
  enable: ${KNIFE4J_ENABLED:false}  # 生产环境默认关闭Knife4j，可通过环境变量开启

# JWT配置 - 生产环境
jwt:
  secret: ${JWT_SECRET:}  # 生产环境必须通过环境变量配置

# 用户配置 - 生产环境
user:
  fromEmail: ${FROM_EMAIL:1796145608@qq.com}  # 支持环境变量

# 文件管理配置 - 生产环境
file:
  upload:
    path: ${FILE_UPLOAD_PATH:./files}  # 支持环境变量配置文件上传路径

# 日志配置 - 生产环境
logging:
  level:
    root: warn  # 生产环境只显示警告及以上级别日志
    org.example.springboot: info  # 应用日志级别
    org.springframework.security: warn
    com.baomidou.mybatisplus: warn
  file:
    name: logs/personal-blog.log  # 生产环境日志文件
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
